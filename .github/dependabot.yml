version: 2
updates:
  # Go module upgrades
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: scope
    labels:
      - dependencies
      - go
    groups:
      # Order matters: dependabot assigns a dependency to the FIRST matching
      # group. Keep the pattern-based groups above the update-types group so
      # aws-sdk and hashicorp bumps land in their dedicated PRs regardless of
      # semver level. Majors outside these patterns stay individual so they're
      # easier to review.
      aws-sdk:
        patterns:
          - "github.com/aws/aws-sdk-go-v2*"
      hashicorp:
        patterns:
          - "github.com/hashicorp/*"
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions (workflows/*) — pins actions used in CI
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/London"
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      # Actions bumps are almost always safe and reviewing them individually
      # is a poor use of time. Collapse all non-major bumps into one weekly
      # PR; majors stay separate so a breaking change can't slip through in
      # a batch.
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  # Docker base-image updates (Dockerfile)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/London"
    commit-message:
      prefix: "docker"
      include: scope
    labels:
      - dependencies
      - docker
    groups:
      docker-minor-and-patch:
        update-types:
          - minor
          - patch
