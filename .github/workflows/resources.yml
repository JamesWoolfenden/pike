name: 'Resources'
on:
  schedule:
    - cron: '0 18 * * 5'
  workflow_dispatch:
permissions: read-all

jobs:
  build:
    env:
      GOTOOLCHAIN: auto
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'

      # Schema-based parse shells out to `terraform providers schema -json`,
      # so a tf binary needs to be on PATH. Installing it once here avoids
      # locateTerraform() falling through to hc-install and downloading a
      # fresh copy for each of the three parse invocations below.
      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: 1.8.8
          tofu_wrapper: false

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build
        run: go build -o ${{ github.workspace }} ./...

      # Schema-based parse no longer needs the provider source repos cloned —
      # it asks the provider binary directly via `terraform providers schema`.
      # If schema extraction ever regresses, `pike parse -n <provider>` will
      # fail the step loudly, which is what we want (docs fallback would
      # silently produce worse data).
      - name: Parse AWS
        run: ${{ github.workspace }}/pike parse -n aws

      - name: Parse Azurerm
        run: ${{ github.workspace }}/pike parse -n azurerm

      - name: Parse Google
        run: ${{ github.workspace }}/pike parse -n google

      - name: Stage member files
        run: cp ${{ github.workspace }}/*.json ${{ github.workspace }}/parse/

      # Re-run coverage against the fresh member JSONs so src/coverage/*.md
      # stays in sync. Without this, the workflow ships new baselines but
      # leaves the published coverage tables stuck at whatever was last
      # regenerated locally.
      - name: Regenerate coverage markdowns
        working-directory: src/coverage
        run: |
          go test -run Test_coverageAws
          go test -run Test_coverageAzure
          go test -run Test_coverageGcp

      - name: setup git config
        run: |
          # Attribute machine-generated commits to github-actions[bot] so they
          # render with the bot badge in the UI and don't leak a personal email
          # into the public commit log.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: commit
        run: |
          # Stage the file, commit and push
          mv *-members.json parse
          git add parse/*-members.json src/coverage/aws.md src/coverage/azure.md src/coverage/google.md --ignore-errors
          git commit -m "updated resources" --allow-empty
          git push origin master
