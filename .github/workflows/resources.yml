name: 'Resources'
on:
  schedule:
    - cron: '0 18 * * 5'
  workflow_dispatch:
permissions: read-all

jobs:
    build:
      permissions: write-all
      runs-on:  ubuntu-latest
      steps:
        - name: Install Go
          uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
          with:
            go-version: '1.25.x'

        ## checks out our code locally, so we can work with the files
        - name: Checkout code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        ## runs go test ./...
        - name: Build
          run: go build -o ${{ github.workspace }} ./...


        - name: Checkout AWS
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            repository: hashicorp/terraform-provider-aws
            path: aws

        - name: Parse Azurerm
          run: ${{ github.workspace }}/pike parse -d ${{ github.workspace }}/aws -name aws

        - name: Checkout AZURERM
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            repository: hashicorp/terraform-provider-azurerm
            path: azurerm

        - name: Parse Azurerm
          run: ${{ github.workspace }}/pike parse -d ${{ github.workspace }}/azurerm -name azurerm

        - name: Generate Google
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            repository: hashicorp/terraform-provider-google
            path: google

        - name: Parse Google
          run: ${{ github.workspace }}/pike parse -d ${{ github.workspace }}/google -name google

        - name: copy
          run: cp ${{ github.workspace }}/*.json ${{ github.workspace }}/parse/
        - name: setup git config
          run: |
            # Attribute machine-generated commits to github-actions[bot] so they
            # render with the bot badge in the UI and don't leak a personal email
            # into the public commit log.
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        - name: commit
          run: |
            # Stage the file, commit and push
            mv *-members.json parse
            git add parse/*-members.json --ignore-errors
            git commit -m "updated resources" --allow-empty
            git push origin master
