on:
  push:
    branches:
      - master

name: CI
permissions: read-all

jobs:
  test:
    env:
      GITHUB_API: ${{ secrets.PAT }}
      GOTOOLCHAIN: auto
    ## We want to define a strategy for our job
    strategy:
      ## this will contain a matrix of all the combinations
      ## we wish to test again:
      matrix:
        go-version: [ 1.25.9 ]
        platform: [ ubuntu-latest, macos-latest, windows-latest ]

    ## Defines the platform for each test run
    runs-on: ${{ matrix.platform }}

    ## the steps that will be run through for each version and platform
    ## combination
    steps:
      ## sets up go based on the version
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: 1.8.8
          tofu_wrapper: false

      ## checks out our code locally, so we can work with the files
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      ## cache the module download directory to avoid re-fetching deps every push
      - name: Restore cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      ## runs go test ./...
      - name: Build
        env:
          GOTOOLCHAIN: auto
        run: go build ./...

      ## runs go test ./...
      - name: Test
        env:
          GOTOOLCHAIN: auto
        run: go test ./... -coverprofile=./cover.out

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
