version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - forbidigo
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
    forbidigo:
      forbid:
        - pattern: ^log\.Print(f|ln)?$
          msg: use zerolog (log.Info/Warn/Error/Debug) instead of stdlib log
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - src/testdata
      - src/mapping
      - src/schema
      - terraform
      - venv
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
